<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wantlist Tracker — Porto & Lisbon</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fafafa;--bg2:#fff;--bg3:#f5f5f5;--tx:#1a1a1a;--tx2:#666;--tx3:#999;--bd:#e5e5e5;--bd2:#eee;--bd3:#ddd;--acc:#111;--grn:#0a7d4f;--grn2:#e6f7ee;--grn3:#096b43;--grnd:#93c9ae;--err:#c00;--errbg:#fff5f5;--errbd:#fdd;--amberbg:#FAEEDA;--ambertx:#854F0B}
.dark{--bg:#161616;--bg2:#222;--bg3:#2a2a2a;--tx:#e5e5e5;--tx2:#aaa;--tx3:#777;--bd:#333;--bd2:#383838;--bd3:#444;--acc:#eee;--grn:#2ecc71;--grn2:#1a3a2a;--grn3:#27ae60;--grnd:#555;--err:#ff6b6b;--errbg:#2a1a1a;--errbd:#4a2020;--amberbg:#412402;--ambertx:#FAC775}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;transition:background .2s,color .2s}
a{color:inherit}
.app{max-width:960px;margin:0 auto;padding:24px 16px 60px}
.header{text-align:center;margin-bottom:32px}
.logo{font-size:28px;font-weight:800;letter-spacing:-.5px;color:var(--acc)}
.logo span{color:var(--tx3);font-weight:400}
.sub{font-size:13px;color:var(--tx3);margin-top:4px}
.ver{font-size:11px;color:var(--tx3);margin-top:6px;font-family:monospace}
.dm-toggle{position:absolute;top:16px;right:16px;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:16px;line-height:1}
.dm-toggle:hover{border-color:var(--tx3)}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:24px;margin-bottom:20px;transition:background .2s,border-color .2s}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
label{display:block;font-size:13px;font-weight:600;color:var(--tx);margin-bottom:6px}
.inp{width:100%;padding:10px 12px;border:1px solid var(--bd3);border-radius:8px;font-size:14px;outline:none;transition:border .2s;font-family:inherit;background:var(--bg2);color:var(--tx)}
.inp:focus{border-color:var(--acc)}
.help{font-size:12px;color:var(--tx3);margin-top:4px}
.help a{color:var(--acc);font-weight:600}
.btn{background:var(--acc);color:var(--bg);border:none;border-radius:8px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sec{background:var(--bg2);color:var(--tx);border:1px solid var(--bd3);border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-sec:hover{background:var(--bg3)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:6px}
.btn-green{background:var(--grn);color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-green:hover{background:var(--grn3)}
.btn-green:disabled{background:var(--grnd);cursor:not-allowed}
.btn-skip{background:var(--bg2);color:var(--tx2);border:1px solid var(--bd3);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-skip:hover{border-color:var(--tx3);color:var(--tx)}
.btn-row{margin-top:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.progress-text{font-size:12px;color:var(--tx2)}
.pbar{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden;margin-top:6px;width:100%}
.pfill{height:100%;border-radius:4px;transition:width .3s ease}
.pfill-dark{background:var(--acc)}
.pfill-green{background:var(--grn)}
.error{background:var(--errbg);border:1px solid var(--errbd);border-radius:8px;padding:16px;color:var(--err);font-size:13px;margin-bottom:16px}
.stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat{background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;padding:12px 18px;flex:1;min-width:80px;transition:background .2s}
.stat-n{font-size:22px;font-weight:800;color:var(--tx)}
.stat-n.green{color:var(--grn)}
.stat-l{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search{padding:8px 12px;border:1px solid var(--bd3);border-radius:8px;font-size:13px;flex:1;min-width:140px;outline:none;font-family:inherit;background:var(--bg2);color:var(--tx)}
.search:focus{border-color:var(--acc)}
.fbtn{padding:5px 12px;font-size:12px;font-weight:600;border-radius:20px;border:0.5px solid var(--bd3);cursor:pointer;background:var(--bg2);color:var(--tx2);font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.fbtn:hover{border-color:var(--tx3)}
.fbtn.on{background:var(--bg3);color:var(--tx);border-color:var(--acc)}
.fbtn .fc{font-size:11px;color:var(--tx3);font-weight:400}
.fbtn .fc span{color:var(--grn);font-weight:600}
.fmt-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.fmt-vinyl{background:#EEEDFE;color:#534AB7}
.fmt-cd{background:#E6F1FB;color:#185FA5}
.fmt-cass{background:#FAEEDA;color:#854F0B}
.fmt-file{background:#F1EFE8;color:#5F5E5A}
.fmt-box{background:#E1F5EE;color:#0F6E56}
.fmt-other{background:#F1EFE8;color:#5F5E5A}
.dark .fmt-vinyl{background:#26215C;color:#AFA9EC}
.dark .fmt-cd{background:#042C53;color:#85B7EB}
.dark .fmt-cass{background:#412402;color:#FAC775}
.dark .fmt-file{background:#2C2C2A;color:#B4B2A9}
.dark .fmt-box{background:#04342C;color:#5DCAA5}
.dark .fmt-other{background:#2C2C2A;color:#B4B2A9}
.vtog{display:flex;border:1px solid var(--bd3);border-radius:6px;overflow:hidden;margin-left:auto;flex-shrink:0}
.vb{padding:6px 10px;border:none;background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.vb+.vb{border-left:1px solid var(--bd3)}
.vb.on{background:var(--acc)}
.vb.on svg *{stroke:var(--bg)}
.vb svg{width:16px;height:16px;stroke:var(--tx2);stroke-width:2;fill:none}
.store-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.store-hdr-btns{display:flex;gap:6px}
.store-hdr-btns button{font-size:11px;color:var(--tx2);background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:2px}
.store-hdr-btns button:hover{color:var(--tx)}
.city-tog{display:flex;gap:4px}
.city-tog button{padding:4px 12px;font-size:11px;font-weight:600;border:1px solid var(--bd3);border-radius:16px;background:transparent;color:var(--tx2);cursor:pointer;font-family:inherit;transition:all .15s}
.city-tog button:hover{border-color:var(--tx3);color:var(--tx)}
.city-tog button.on{background:var(--acc);color:var(--bg);border-color:var(--acc)}
.city-pill{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:600;margin-left:4px;white-space:nowrap}
.city-porto{background:#E6F1FB;color:#185FA5}
.city-lisbon{background:#FAECE7;color:#993C1D}
.dark .city-porto{background:#042C53;color:#85B7EB}
.dark .city-lisbon{background:#4A1B0C;color:#F0997B}
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:12px}
.store-grid.opening{animation:gridOpen .2s ease}
.store-grid.closing{animation:gridClose .15s ease forwards}
@keyframes gridOpen{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes gridClose{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-6px)}}
.store-opt{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--bd);border-radius:8px;cursor:pointer;transition:all .15s;background:var(--bg2);font-size:12px}
.store-opt:hover{border-color:var(--tx3)}
.store-opt.on{border-color:var(--acc);background:var(--bg3)}
.store-opt .logo{width:24px;height:24px;border-radius:50%;flex-shrink:0;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.store-opt .logo img{width:100%;height:100%;object-fit:cover}
.store-opt .sn{font-weight:600;color:var(--tx);flex:1}
.store-opt .st{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px}
.store-opt .slinks{display:flex;gap:4px;margin-top:3px}
.store-opt .slinks a{display:inline-flex;align-items:center;gap:3px;font-size:9px;color:var(--tx3);text-decoration:none;font-weight:600;padding:1px 6px;border:0.5px solid var(--bd3);border-radius:10px}
.store-opt .slinks a:hover{border-color:var(--tx3);color:var(--tx)}
.store-opt .slinks .ic{display:inline-flex;align-items:center;justify-content:center;width:10px;height:10px}
.store-opt .slinks .ic svg{width:10px;height:10px;stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.store-opt input{display:none}
.check-progress{flex:1;min-width:250px;max-width:500px}
.check-log{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.cl-entry{font-size:11px;color:var(--grn);background:var(--grn2);border:1px solid var(--grn);border-radius:4px;padding:2px 7px;opacity:.75}
.store-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.store-stat{display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--bd2);border-radius:8px;background:var(--bg2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.store-stat:hover{border-color:var(--tx3)}
.store-stat .slogo{width:16px;height:16px;border-radius:50%;overflow:hidden;flex-shrink:0}
.store-stat .slogo img{width:100%;height:100%;object-fit:cover}
.store-stat .cnt{color:var(--grn)}
.store-stat.on{border-color:var(--acc);background:var(--bg3)}
/* Items */
.v-list .it{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;display:flex;align-items:center;gap:12px;padding:10px 14px;margin-bottom:8px;transition:box-shadow .2s,background .2s}
.v-list .it:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.v-list .it-iw{width:52px;height:52px;flex-shrink:0;border-radius:6px;overflow:hidden;background:var(--bg3);position:relative}
.v-list .it-iw img{width:100%;height:100%;object-fit:cover}
.v-list .it-iw .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.v-list .it-bd{flex:1;min-width:0}
.v-list .it-ar{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-list .it-ti{font-size:13px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-list .it-me{font-size:11px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-list .it-act{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.v-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.v-grid-sm{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.v-grid .it,.v-grid-sm .it{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;overflow:hidden;transition:box-shadow .2s,transform .15s;display:flex;flex-direction:column}
.v-grid .it:hover,.v-grid-sm .it:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);transform:translateY(-2px)}
.v-grid .it-iw,.v-grid-sm .it-iw{width:100%;padding-top:100%;position:relative;overflow:hidden;background:var(--bg3);flex-shrink:0}
.v-grid .it-iw img,.v-grid-sm .it-iw img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.v-grid .it-iw .ph,.v-grid-sm .it-iw .ph{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.v-grid .it-bd{padding:10px 12px;flex:1;display:flex;flex-direction:column}
.v-grid-sm .it-bd{padding:7px 9px;flex:1;display:flex;flex-direction:column}
.v-grid .it-ar{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-grid-sm .it-ar{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-grid .it-ti{font-size:13px;font-weight:700;color:var(--tx);margin-top:1px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.v-grid-sm .it-ti{font-size:11px;font-weight:700;color:var(--tx);margin-top:1px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.v-grid .it-me{font-size:10px;color:var(--tx3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-grid-sm .it-me{font-size:9px;color:var(--tx3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.badge a{text-decoration:underline;text-underline-offset:2px}
.badge.oos{opacity:.6}
.badge.oos a{text-decoration:line-through}
.badge.diff{background:var(--amberbg) !important;color:var(--ambertx) !important}
.badge.diff a{color:var(--ambertx) !important}
.badge .hint{font-size:9px;font-weight:400;opacity:.7}
.avail-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:4px;padding-top:4px;border-top:0.5px solid var(--bd2)}
.avail-label{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px;margin-right:2px}
.it-lnk{display:inline-flex;align-items:center;font-size:11px;font-weight:600;color:var(--tx3);text-decoration:none;padding:3px 8px;border:1px solid var(--bd2);border-radius:5px;transition:all .15s;background:var(--bg2);white-space:nowrap}
.it-lnk:hover{background:var(--bg3);color:var(--tx)}
/* Stack effect — layers peek below-right, suggesting physical depth */
.v-list .it-grp:not(.open),.v-grid .it-grp:not(.open),.v-grid-sm .it-grp:not(.open){box-shadow:4px 4px 0 0 var(--bd2),8px 8px 0 0 var(--bd2)}
.v-list .it-grp.open,.v-grid .it-grp.open,.v-grid-sm .it-grp.open{box-shadow:none}
.v-list .it-grp:not(.open){margin-right:8px;margin-bottom:16px}
.v-grid .it-grp:not(.open),.v-grid-sm .it-grp:not(.open){margin-right:8px;margin-bottom:16px}
.grp-tog{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--tx3);background:transparent;border:1px solid var(--bd2);border-radius:8px;padding:3px 8px;margin-top:7px;cursor:pointer;transition:all .15s;width:fit-content}
.grp-tog:hover{background:var(--bg3);color:var(--tx);border-color:var(--bd)}
.grp-tog svg{flex-shrink:0;opacity:.7}
.grp-body{margin-top:8px;display:flex;flex-direction:column;gap:0}
.grp-row{display:flex;flex-direction:column;gap:3px;padding:8px 0 8px 12px;border-left:2px solid var(--bd2);margin-left:6px;margin-bottom:4px}
.grp-row:last-child{margin-bottom:0}
.empty{text-align:center;padding:40px;color:var(--tx3)}
.howto{text-align:center;color:var(--tx2);font-size:13px;line-height:1.7}
.howto strong{color:var(--tx)}
.note{font-size:12px;color:var(--tx3);margin-top:12px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.more{text-align:center;padding:20px}
.vinyl{opacity:.15}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes indeterminate{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
.spinner{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;animation:spin 1.8s linear infinite}
.spinner svg{display:block}
.phase-label{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.store-city-hdr{display:none;grid-column:1/-1;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);padding:8px 2px 2px;margin-top:4px}
@media(max-width:600px){
  .v-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .v-list .it{flex-wrap:wrap}
  .store-grid{grid-template-columns:1fr}
  .store-city-hdr{display:block}
}
.src-tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--bd)}
.src-tab{background:none;border:none;padding:10px 16px;font-size:13px;font-weight:600;color:var(--tx3);cursor:pointer;font-family:inherit;position:relative;transition:color .15s}
.src-tab:hover{color:var(--tx2)}
.src-tab.on{color:var(--tx)}
.src-tab.on::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--acc)}
.stale-banner{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:8px;background:var(--amberbg);color:var(--ambertx);font-size:12px;font-weight:500;margin-bottom:16px}
.stale-banner button{background:none;border:1px solid var(--ambertx);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--ambertx);cursor:pointer;font-family:inherit;white-space:nowrap}
.stale-banner button:hover{background:rgba(0,0,0,.05)}
</style>
</head>
<body>
<div class="app">
  <button class="dm-toggle" id="dmtog" title="Toggle dark mode">&#9790;</button>
  <div class="header">
    <div class="logo">Wantlist <span>&times;</span> Tracker</div>
    <div class="sub">Check your wantlist across Porto &amp; Lisbon record stores</div>
    <div class="ver">v0.11.0 &mdash; 2026-03-22</div>
  </div>
  <div id="root"></div>
  <div style="text-align:center;padding:40px 16px 20px;font-size:11px;color:var(--tx3)">Visit your neighborhood record stores and shop locally.<br><a href="https://github.com/J-deAlmeida/Discogs-Wantlist-Tracker/blob/main/FAQ.md" target="_blank" style="color:var(--tx3);text-decoration:underline;text-underline-offset:2px">FAQ</a> &middot; &copy; 2026 Geminus Dancing Studios. Ardazubre, Baixo Mondego.</div>
</div>
<script>
(function(){
"use strict";

var WORKER="https://porto-store-proxy.jsantosdealmeida.workers.dev/";
var PER_PAGE=60;
var CONCURRENT=4;

/* Dark mode */
if(localStorage.getItem("dm")==="1")document.body.classList.add("dark");
document.getElementById("dmtog").addEventListener("click",function(){
  document.body.classList.toggle("dark");
  localStorage.setItem("dm",document.body.classList.contains("dark")?"1":"0")});

/* ========== TEXT HELPERS ========== */
function slug(t){return(t||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"")}
function norm(s){return(s||"").toLowerCase()
  .replace(/[\u00e0-\u00e5]/g,"a").replace(/[\u00e8-\u00eb]/g,"e")
  .replace(/[\u00ec-\u00ef]/g,"i").replace(/[\u00f2-\u00f6]/g,"o")
  .replace(/[\u00f9-\u00fc]/g,"u").replace(/[\u00f1]/g,"n").replace(/[\u00e7]/g,"c")
  .replace(/[^a-z0-9]/g," ").replace(/\s+/g," ").trim()}
function artFirst(s){return(s||"").replace(/\s*\(\d+\)\s*$/,"").split(",")[0].trim()}
function elapsedStr(ms){var s=Math.round(ms/1000);if(s<60)return s+"s";return Math.floor(s/60)+"m "+("0"+(s%60)).slice(-2)+"s"}
function agoStr(ts){if(!ts)return"";var d=Date.now()-ts;var m=Math.floor(d/60000);if(m<1)return"just now";if(m<60)return m+"m ago";var hr=Math.floor(m/60);if(hr<24)return hr+"h ago";var dy=Math.floor(hr/24);return dy+"d ago"}
function detectAndParse(text,filename){
  var trimmed=text.trimStart();
  if((filename||"").toLowerCase().endsWith(".xml")||trimmed.startsWith("<?xml")||trimmed.indexOf("<plist")!==-1)
    return parseItunesXML(text);
  /* TSV: has tabs AND first line contains an "artist" column header */
  var firstLine=trimmed.split(/\r\n|\r|\n/)[0]||"";
  if(firstLine.indexOf("\t")!==-1&&firstLine.toLowerCase().indexOf("artist")!==-1)
    return parseItunesTSV(text);
  return parseCSV(text)}

  var b=norm(body),a=norm(artist),t=norm(title);

/* Shopify product match — strict: title must appear in product title, artist in title or vendor */
function shopifyMatch(prod,it){
  var pt=norm(prod.title||"");
  var pv=norm(prod.vendor||"");
  var ti=norm(it.title);
  var ai=norm(artFirst(it.artist));
  if(ti.length<3)return null;
  /* Title must appear in product title */
  if(pt.indexOf(ti)===-1)return null;
  /* For short titles (<6 chars), require exact product title match or artist present */
  if(ti.length<6){
    if(pt===ti||(ai.length>2&&(pt.indexOf(ai)!==-1||pv.indexOf(ai)!==-1)))
      return{found:true,oos:prod.available===false};
    return null}
  /* Longer titles: if title matches, check artist too for safety */
  if(ai.length>2&&pt.indexOf(ai)===-1&&pv.indexOf(ai)===-1)return null;
  return{found:true,oos:prod.available===false}}

/* Common Ground product match — title must appear in product, artist in product or artists list */
function cgMatch(cgItem,it){
  var pt=norm(cgItem.data.title||"");
  var ai=norm(artFirst(it.artist));
  var ti=norm(it.title);
  /* Exact Discogs release ID match */
  if(String(cgItem.id)===it.id)return{found:true,exact:true};
  if(ti.length<3)return null;
  /* Title must appear in product title */
  if(pt.indexOf(ti)===-1)return null;
  /* Build combined artist string from CG data */
  var cgArtists=(cgItem.data.artists||[]).map(function(a){return norm(a.name)}).join(" ");
  /* For short titles, require artist match */
  if(ti.length<6){
    if(ai.length>2&&pt.indexOf(ai)===-1&&cgArtists.indexOf(ai)===-1)return null;
    if(ai.length<=2)return null;
    return{found:true,exact:false}}
  /* Longer titles: check artist too */
  if(ai.length>2&&pt.indexOf(ai)===-1&&cgArtists.indexOf(ai)===-1)return null;
  return{found:true,exact:false}}

/* ========== ITUNES / APPLE MUSIC XML PARSER ========== */
function parseItunesXML(xmlText){
  try{
    var parser=new DOMParser();
    var doc=parser.parseFromString(xmlText,"text/xml");
    if(doc.querySelector("parsererror"))return{items:[],error:"Invalid XML file.",format:"itunes"};
    /* Helper: <dict> element → plain JS object. Nested <dict> values kept as elements. */
    function pld(dictEl){
      var obj={},ch=dictEl.children,i=0;
      while(i<ch.length){
        if(ch[i].tagName==="key"&&i+1<ch.length){
          var k=ch[i].textContent,v=ch[i+1];
          if(v.tagName==="dict")obj[k]=v;
          else if(v.tagName==="true")obj[k]=true;
          else if(v.tagName==="false")obj[k]=false;
          else obj[k]=v.textContent;
          i+=2}else{i++}}
      return obj}
    var rootDict=doc.querySelector("plist > dict");
    if(!rootDict)return{items:[],error:"Not a valid iTunes/Music library file.",format:"itunes"};
    var root=pld(rootDict);
    if(!root["Tracks"])return{items:[],error:"No Tracks found. Export your library from Music \u2192 File \u2192 Library \u2192 Export Library\u2026",format:"itunes"};
    var tracksDict=root["Tracks"];
    var albums={};
    var ch=tracksDict.children;
    for(var i=0;i<ch.length;i++){
      if(ch[i].tagName!=="dict")continue;
      var t=pld(ch[i]);
      if(!t["Album"])continue;
      if(t["Podcast"]===true||t["Movie"]===true||t["TV Show"]===true||t["Audiobook"]===true)continue;
      var aa=t["Album Artist"]||t["Artist"]||"Unknown";
      var al=t["Album"];
      var key=aa.toLowerCase()+"\x00"+al.toLowerCase();
      if(!albums[key])albums[key]={artist:aa,title:al,year:t["Year"]||""}}
    var items=Object.values(albums).map(function(a){
      return{id:"",_key:"csv_"+(++_ks),source:"itunes",artist:a.artist,title:a.title,year:a.year,label:"",format:"",catno:"",thumb:""}});
    if(!items.length)return{items:[],error:"No albums found. Make sure to export a Music library (not a playlist).",format:"itunes"};
    return{items:items,error:null,format:"itunes"}
  }catch(e){return{items:[],error:"Parse failed: "+e.message,format:"itunes"}}}

/* ========== ITUNES / APPLE MUSIC PLAYLIST TSV PARSER ========== */
/* Handles the tab-separated file produced by File → Library → Export Playlist */
function parseItunesTSV(text){
  try{
    var lines=text.split(/\r\n|\r|\n/).filter(function(l){return l.trim()});
    if(lines.length<2)return{items:[],error:"Need at least a header row and one data row.",format:"itunes"};
    var headers=lines[0].split("\t").map(function(h){return h.trim().toLowerCase()});
    function col(){for(var i=0;i<arguments.length;i++){var x=headers.indexOf(arguments[i].toLowerCase());if(x!==-1)return x}return-1}
    var cArtist=col("artist"),cAlbum=col("album"),cYear=col("year");
    if(cArtist===-1)return{items:[],error:'No "Artist" column found. Is this an iTunes/Music playlist export?',format:"itunes"};
    if(cAlbum===-1)return{items:[],error:'No "Album" column found. Is this an iTunes/Music playlist export?',format:"itunes"};
    var albums={};
    for(var i=1;i<lines.length;i++){
      var fields=lines[i].split("\t");
      var artist=(fields[cArtist]||"").trim();
      var album=(fields[cAlbum]||"").trim();
      if(!album||!artist)continue;
      var key=artist.toLowerCase()+"\x00"+album.toLowerCase();
      if(!albums[key])albums[key]={artist:artist,title:album,year:cYear!==-1?(fields[cYear]||"").trim():""}}
    var items=Object.values(albums).map(function(a){
      return{id:"",_key:"csv_"+(++_ks),source:"itunes",artist:a.artist,title:a.title,year:a.year,label:"",format:"",catno:"",thumb:""}});
    if(!items.length)return{items:[],error:"No albums found. Make sure each track has Artist and Album fields.",format:"itunes"};
    return{items:items,error:null,format:"itunes"}
  }catch(e){return{items:[],error:"Parse failed: "+e.message,format:"itunes"}}}

function parseCSV(text){
  text=(text||"").trim();
  if(!text)return{items:[],error:"No content to parse."};
  var lines=text.split(/\r\n|\r|\n/).filter(function(l){return l.trim()});
  if(lines.length<2)return{items:[],error:"Need at least a header row and one data row."};
  var semi=(lines[0].match(/;/g)||[]).length,com=(lines[0].match(/,/g)||[]).length;
  var delim=semi>com?";":","
  function parseRow(line){
    var fields=[],cur="",inQ=false;
    for(var i=0;i<line.length;i++){var c=line[i];
      if(c==='"'){inQ=!inQ}else if(c===delim&&!inQ){fields.push(cur.trim());cur=""}else{cur+=c}}
    fields.push(cur.trim());return fields}
  var hd=parseRow(lines[0]).map(function(h){return h.toLowerCase().replace(/^["\s\ufeff]+|["\s]+$/g,"")});
  function col(){for(var i=0;i<arguments.length;i++){var x=hd.indexOf(arguments[i]);if(x!==-1)return x}return-1}
  var cArtist=col("artist","artist_name","artist name");
  var cTitle=col("title","release_title","album");
  var cLabel=col("label");var cYear=col("year","release_date","date");
  var cFmt=col("format");var cCatno=col("catno","catalog#","catalogue#");
  var cId=col("release_id","discogs_id");
  var cFirst=col("first name","firstname");var cLast=col("last name","lastname");
  if(cArtist===-1&&cLast!==-1)cArtist=-2;
  if(cTitle===-1)return{items:[],error:'No title column found. Expected: "title", "release_title", or "album".'};
  if(cArtist===-1)return{items:[],error:'No artist column found. Expected: "artist", "artist_name", or "last name".'};
  var items=[];
  for(var i=1;i<lines.length;i++){
    var r=parseRow(lines[i]);
    if(r.every(function(f){return!f.trim()}))continue;
    var artist;
    if(cArtist===-2){
      var fn=cFirst!==-1?(r[cFirst]||"").replace(/^"+|"+$/g,"").trim():"";
      var ln=cLast!==-1?(r[cLast]||"").replace(/^"+|"+$/g,"").trim():"";
      artist=[fn,ln].filter(Boolean).join(" ")||"Unknown"
    }else{artist=(r[cArtist]||"").replace(/^"+|"+$/g,"").trim().replace(/\s*\(\d+\)\s*$/,"")||"Unknown"}
    var title=(r[cTitle]||"").replace(/^"+|"+$/g,"").trim();
    if(!title)continue;
    var id=cId!==-1?(r[cId]||"").trim():"";
    if(id&&!/^\d+$/.test(id))id="";
    items.push({id:id,_key:id||"csv_"+(++_ks),source:"csv",artist:artist,title:title,
      label:cLabel!==-1?(r[cLabel]||"").trim():"",
      catno:cCatno!==-1?(r[cCatno]||"").trim():"",
      format:cFmt!==-1?(r[cFmt]||"").trim():"",
      year:cYear!==-1?(r[cYear]||"").split(/[-\/]/)[0].trim():"",
      thumb:""})}
  if(items.length===0)return{items:[],error:"No valid rows found after parsing."};
  return{items:items,error:null}}

/* ========== MUSICBRAINZ ========== */
async function fetchMBCollections(username){
  S.mbLoading=true;S.mbError=null;S.mbCollections=[];render();
  try{
    var r=await fetch("https://musicbrainz.org/ws/2/collection?editor="+encodeURIComponent(username)+"&fmt=json",
      {headers:{"User-Agent":"PortoWantlistTracker/4.0 (github.com/J-deAlmeida)"}});
    if(!r.ok)throw new Error("MusicBrainz error ("+r.status+")");
    var d=await r.json();
    var cols=(d.collections||[]).filter(function(c){return c["entity-type"]==="release"});
    if(cols.length===0)throw new Error("No release collections found for \u201c"+username+"\u201d");
    S.mbCollections=cols.map(function(c){return{id:c.id,name:c.name,count:c["release-count"]||0}});
    S.mbCollectionIds=S.mbCollections.map(function(c){return c.id})
  }catch(e){S.mbError=e.message}
  S.mbLoading=false;render()}

async function fetchMBCollection(){
  var colIds=S.mbCollectionIds;
  var cols=S.mbCollections.filter(function(c){return colIds.indexOf(c.id)>=0});
  if(!cols.length)return;
  var merging=S.addingSource;
  S.loading=true;S.loadingLabel="Loading collection\u2026";S.error=null;
  if(!merging){S.items=[];S.loaded=false;S.results={};S.invCache={};S.sources=[];}
  S.progress=null;S.checking=false;S.onlyFound=false;
  if(!merging){S.vis=PER_PAGE;S.search="";S.format="all";S.filterStores={};}
  S.user=S.mbUser;
  render();
  var all=[];
  var grandTotal=cols.reduce(function(s,c){return s+(c.count||0)},0);
  try{
    for(var ci=0;ci<cols.length;ci++){
      var col=cols[ci];
      var colId=col.id;
      var offset=0,total=col.count||1;
      do{
        var url="https://musicbrainz.org/ws/2/release?collection="+colId+"&fmt=json&limit=100&offset="+offset+"&inc=artist-credits+media";
        var r=await fetch(url,{headers:{"User-Agent":"PortoWantlistTracker/4.0 (github.com/J-deAlmeida)"}});
        if(!r.ok)throw new Error("MusicBrainz error ("+r.status+")");
        var d=await r.json();
        total=d["release-count"]||total;
        var rels=d.releases||[];
        all=all.concat(rels);offset+=rels.length;
        grandTotal=cols.reduce(function(s,c,i){return s+(i<ci?c.count:i===ci?total:c.count||0)},0);
        S.progress={ld:all.length,tot:grandTotal,pg:Math.ceil(offset/100),tp:Math.ceil(total/100)};
        render();
        if(offset<total||(ci<cols.length-1&&rels.length>0))await wait(1100)
      }while(offset<total&&rels.length>0)
    }
    var newItems=all.map(function(rel,i){
      var ac=rel["artist-credit"]||[];
      var artist=ac.map(function(a){return(a.name||(a.artist&&a.artist.name)||"")+(a.joinphrase||"")}).join("").trim()||"Unknown";
      var li=(rel["label-info"]||[])[0]||{};
      var fmt=(rel.media||[])[0]?(rel.media[0].format||""):"";
      return{id:"",_key:"mb_"+(rel.id||++_ks),source:"mb",artist:artist,title:rel.title||"",
        label:li.label?li.label.name:"",catno:li["catalog-number"]||"",
        format:fmt,year:(rel.date||"").split("-")[0],
        thumb:rel.id?"https://coverartarchive.org/release/"+rel.id+"/front-250":""}});
    if(merging){newItems=newItems.filter(function(it){return!isDuplicate(it)});S.items=S.items.concat(newItems)}
    else{S.items=newItems}
    var colNames=cols.map(function(c){return c.name}).join(", ");
    S.sources=S.sources.concat(["MusicBrainz \u00b7 "+colNames]);
    S.addingSource=false;S.loaded=true
  }catch(e){S.error=e.message;S.addingSource=false}
  S.loading=false;S.progress=null;S.lastChecked=null;saveState();render()}

async function fetchWL(){
  var merging=S.addingSource;
  S.loading=true;S.loadingLabel="Fetching wantlist\u2026";S.error=null;
  if(!merging){S.items=[];S.loaded=false;S.results={};S.invCache={};S.sources=[];}
  S.progress=null;S.checking=false;S.onlyFound=false;
  if(!merging){S.vis=PER_PAGE;S.search="";S.format="all";S.filterStores={};}
  render();
  var pg=1,all=[],tp=1,tot=0;
  try{
    while(pg<=tp){
      var url=WORKER+"?wantlist="+encodeURIComponent(S.user)+"&page="+pg;
      var r=await fetch(url);
      var txt=await r.text();
      if(!txt)throw new Error("Empty response from worker — redeploy the worker");
      var d;try{d=JSON.parse(txt)}catch(e){throw new Error("Worker returned non-JSON: "+txt.slice(0,80))}
      if(!r.ok){if(r.status===429){await wait(2500);continue}throw new Error(d.error||d.message||"Discogs error ("+r.status+")")};tp=d.pagination&&d.pagination.pages||1;tot=d.pagination&&d.pagination.items||0;
      all=all.concat(d.wants||[]);S.progress={ld:all.length,tot:tot,pg:pg,tp:tp};render();
      pg++;if(pg<=tp)await wait(1100)}
    var newItems=all.map(function(w){var b=w.basic_information||{};var kid=String(b.id||w.id||"");return{id:kid,_key:kid,source:"discogs",
      artist:(b.artists||[]).map(function(a){return a.name.replace(/ \(\d+\)$/,"")}).join(", ")||"Unknown",
      title:b.title||"",label:(b.labels||[])[0]?b.labels[0].name:"",catno:(b.labels||[])[0]?b.labels[0].catno:"",
      format:(b.formats||[]).map(function(f){return f.name}).join(", "),year:b.year||"",thumb:b.cover_image||b.thumb||""}});
    if(merging){newItems=newItems.filter(function(it){return!isDuplicate(it)});S.items=S.items.concat(newItems)}
    else{S.items=newItems}
    S.sources=S.sources.concat(["Discogs \u00b7 "+S.user]);
    S.addingSource=false;S.loaded=true
  }catch(e){S.error=e.message;S.addingSource=false}S.loading=false;S.progress=null;S.lastChecked=null;saveState();render()}

/* ========== WEB CHECK ========== */
async function checkWebItem(store,it){
  var adapter=ADAPTERS[store.platform]||{};
  var cu=(adapter.getCheckUrl?adapter.getCheckUrl(store,it):null)||(store.getCheckUrl?store.getCheckUrl(it):null);
  var endpoint=(adapter.getEndpoint?adapter.getEndpoint(store,it):null)||(store.getEndpoint?store.getEndpoint(it):null)||(cu?WORKER+"?url="+encodeURIComponent(cu):null);
  if(!endpoint)return{s:"no"};
  try{
    var r=await fetch(endpoint);if(!r.ok)return{s:"err"};
    var j=await r.json();if(j.error)return{s:"err"};
    var detectFn=adapter.detect?function(j,it){return adapter.detect(store,j,it)}:store.detect;
    if(!detectFn)return{s:"no"};
    return detectFn(j,it)
  }catch(e){return{s:"err"}}}

/* Group items by normalized artist+title — returns [{rep, keys}] where rep is the
   representative item to check and keys are all _keys that share the same title. */
function groupItems(items){
  var groups={},order=[];
  items.forEach(function(it){
    var k=norm(artFirst(it.artist))+"\x00"+norm(it.title);
    if(!groups[k]){groups[k]={rep:it,keys:[]};order.push(k)}
    groups[k].keys.push(it._key)});
  return order.map(function(k){return groups[k]})}

async function checkWebStore(store){
  S.checkPhase="web";S.checkStore=store.name;S.cskip=false;
  if(!S.results[store.id])S.results[store.id]={};
  var groups=groupItems(S.items),queue=groups.slice(),done=0,tot=S.items.length;
  var conc=store.concurrent||CONCURRENT;
  var delay=store.delay||250;
  S.checkProg={done:0,tot:tot,found:0};updateCheckUI();
  while(queue.length>0&&!S.cabort&&!S.cskip){
    var batch=queue.splice(0,conc);
    var results=await Promise.all(batch.map(function(g){return checkWebItem(store,g.rep).then(function(r){return{g:g,r:r}})}));
    results.forEach(function(o){o.g.keys.forEach(function(k){S.results[store.id][k]=o.r})});
    done+=batch.reduce(function(s,g){return s+g.keys.length},0);
    var fc=0,errc=0;Object.values(S.results[store.id]).forEach(function(v){if(v.s==="found")fc++;else if(v.s==="err")errc++});
    S.checkProg={done:done,tot:tot,found:fc,errs:errc};
    var pct=Math.round(done/Math.max(tot,1)*100);
    var pt=$("chkprog");if(pt)pt.textContent=pct+"% \u00b7 "+fc+" found"+(errc?" \u00b7 \u26a0\ufe0f "+errc+" errors":"")+" \u00b7 "+elapsedStr(Date.now()-S.checkStart);
    var pf=$("chkfill");if(pf)pf.style.width=pct+"%";
    if(queue.length>0&&!S.cabort&&!S.cskip)await wait(delay)}
  if(S.cskip)console.log("[web] Skipped "+store.name)}

/* ========== GRAPHQL CHECK (Common Ground) ========== */
async function checkGraphQLStore(store){
  S.checkPhase="web";S.cskip=false;
  if(!S.results[store.id])S.results[store.id]={};
  var allItems=S.items.slice(),done=0,tot=allItems.length;
  var conc=store.concurrent||3,dly=store.delay||700;
  S.checkProg={done:0,tot:tot,found:0};updateCheckUI();

  /* If store has a fast URL check (getCheckUrl+detect), route ID items through it.
     Items without a Discogs ID always fall back to GraphQL text search. */
  var idQueue=store.getCheckUrl?allItems.filter(function(it){return!!it.id}):[];
  var noIdItems=store.getCheckUrl?allItems.filter(function(it){return!it.id}):allItems;
  /* Deduplicate no-ID items by artist+title — one GraphQL request per unique title */
  var gqlQueue=groupItems(noIdItems);

  function cgProg(){
    var fc=0;Object.values(S.results[store.id]).forEach(function(v){if(v.s==="found")fc++});
    S.checkProg={done:done,tot:tot,found:fc};
    var pct=Math.round(done/Math.max(tot,1)*100);
    var pt=$("chkprog");if(pt)pt.textContent=store.short+": "+pct+"% \u00b7 "+fc+" found \u00b7 "+elapsedStr(Date.now()-S.checkStart);
    var pf=$("chkfill");if(pf)pf.style.width=pct+"%"}

  /* Fast path: direct URL check via worker for items with Discogs ID */
  while(idQueue.length>0&&!S.cabort&&!S.cskip){
    var batch=idQueue.splice(0,conc);
    var results=await Promise.all(batch.map(function(it){
      return checkWebItem(store,it).then(function(r){return{it:it,r:r}})}));
    results.forEach(function(o){S.results[store.id][o.it._key]=o.r});
    done+=batch.length;cgProg();
    if(idQueue.length>0&&!S.cabort&&!S.cskip)await wait(dly)}

  /* GraphQL text search for items without a Discogs ID — deduplicated by title */
  while(gqlQueue.length>0&&!S.cabort&&!S.cskip){
    var batch=gqlQueue.splice(0,conc);
    var results=await Promise.all(batch.map(function(g){
      var it=g.rep;
      return fetch(store.graphqlUrl,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({operationName:"search",query:CG_SEARCH_GQL,variables:{term:qry(it)}})
      }).then(function(r){return r.json()}).then(function(d){
        var items=(d.data&&d.data.search&&d.data.search.items)||[];
        for(var i=0;i<items.length;i++){
          var m=cgMatch(items[i],it);
          if(m&&m.found){
            var hasStock=false;
            var ls=items[i].listings||[];
            for(var k=0;k<ls.length;k++){if(ls[k].available&&ls[k].stock&&ls[k].stock.quantity>0){hasStock=true;break}}
            var itemPath=items[i].path||"";
            var storeUrl=itemPath?(store.url+itemPath):store.url;
            return{g:g,r:{s:"found",oos:!hasStock,storeUrl:storeUrl,exact:!!m.exact}}}}
        return{g:g,r:{s:"no"}}
      }).catch(function(){return{g:g,r:{s:"err"}}})}));
    results.forEach(function(o){o.g.keys.forEach(function(k){S.results[store.id][k]=o.r})});
    done+=batch.reduce(function(s,g){return s+g.keys.length},0);cgProg();
    if(gqlQueue.length>0&&!S.cabort&&!S.cskip)await wait(dly)}
  if(S.cskip)console.log("[graphql] Skipped "+store.name)}

/* ========== CATALOG PRE-FETCH ========== */
var SHOPIFY_CATALOG_IDS=new Set(["musicriots","discosdobau","flur"]);

async function prefetchCatalogs(stores){
  var shopifyStores=stores.filter(function(s){return SHOPIFY_CATALOG_IDS.has(s.id)&&!S.catalogCache[s.id]});
  if(!shopifyStores.length)return;
  S.checkPhase="catalog";S.checkStore="Loading catalogs\u2026";render();
  await Promise.all(shopifyStores.map(function(s){
    return fetch(WORKER+"?catalog="+encodeURIComponent(s.id))
      .then(function(r){return r.json()})
      .then(function(d){if(!d.error&&d.products)S.catalogCache[s.id]=d})
      .catch(function(){/* cold cache — will fall back to live */})}));}

function checkShopifyCached(store){
  var catalog=S.catalogCache[store.id];
  if(!catalog||!catalog.products)return false;
  if(!S.results[store.id])S.results[store.id]={};
  var prods=catalog.products;
  S.items.forEach(function(it){
    var result={s:"no"};
    for(var i=0;i<prods.length;i++){var m=shopifyMatch(prods[i],it);if(m&&m.found){result={s:"found",oos:m.oos};break}}
    S.results[store.id][it._key]=result});
  return true;}

/* ========== CHECK ALL ========== */
async function checkAll(forceRecheck){
  S.checking=true;S.cabort=false;S.cskip=false;
  if(forceRecheck)S.results={};
  S.filterStores={};S.onlyFound=false;
  var selected=CHECKABLE.filter(function(s){return S.selectedStores[s.id]});
  if(!forceRecheck)selected=selected.filter(function(s){return!S.results[s.id]});
  S.checkStart=Date.now();S.storesDone=0;S.storesTotal=selected.length;S.checkLog=[];
  render();
  var webStores=selected.filter(function(s){return s.platform!=="discogs"&&s.platform!=="common-ground"&&s.platform!=="web-tbd"});
  var graphqlStores=selected.filter(function(s){return s.platform==="common-ground"});
  var discogsStores=selected.filter(function(s){return s.platform==="discogs"});
  /* Pre-fetch Shopify catalogs before checking starts */
  await prefetchCatalogs(selected);
  /* GraphQL stores run first (parallel, different servers) so 8mm results appear immediately */
  if(graphqlStores.length>0&&!S.cabort){
    S.checkStore=graphqlStores.map(function(s){return s.short}).join(" + ");
    render();
    await Promise.all(graphqlStores.map(function(s){return checkGraphQLStore(s)}));
    graphqlStores.forEach(function(s){S.storesDone++;S.checkLog.push({name:s.short,found:storeFoundCount(s.id)})});
    render()}
  for(var j=0;j<webStores.length&&!S.cabort;j++){
    /* Use cached catalog for Shopify stores when available */
    if(SHOPIFY_CATALOG_IDS.has(webStores[j].id)&&checkShopifyCached(webStores[j])){
      S.storesDone++;S.checkLog.push({name:webStores[j].short,found:storeFoundCount(webStores[j].id)});
      render();continue}
    await checkWebStore(webStores[j]);
    S.storesDone++;S.checkLog.push({name:webStores[j].short,found:storeFoundCount(webStores[j].id)});
    render()}
  for(var i=0;i<discogsStores.length&&!S.cabort;i++){
    await checkDiscogsStore(discogsStores[i]);
    S.storesDone++;S.checkLog.push({name:discogsStores[i].short,found:storeFoundCount(discogsStores[i].id)});
    render()}
  S.checking=false;S.checkPhase="";S.checkStore="";S.checkProg=null;
  S.lastChecked=Date.now();saveState();render()}

function updateCheckUI(){
  var el=$("chkphase");if(el){
    var prefix=S.checkPhase==="discogs"?"Loading: ":"Checking: ";
    var counter=S.storesTotal>1?" ("+( S.storesDone+1)+"/"+S.storesTotal+")":"";
    el.textContent=prefix+S.checkStore+counter}}

/* ========== RESULT HELPERS ========== */
function getItemStores(it){
  var found=[];STORES.forEach(function(s){if(S.results[s.id]&&S.results[s.id][it._key]&&S.results[s.id][it._key].s==="found")found.push(s)});return found}
function isOos(it,sid){var r=S.results[sid]&&S.results[sid][it._key];return r&&r.oos}
function csvCell(v){v=String(v||"");return v.indexOf(",")!==-1||v.indexOf('"')!==-1||v.indexOf("\n")!==-1?'"'+v.replace(/"/g,'""')+'"':v}
function exportCSV(){
  var checkedStores=CHECKABLE.filter(function(s){return S.results[s.id]});
  var header=["Artist","Title","Year","Label","Format","Source"].concat(checkedStores.map(function(s){return s.name}));
  var rows=[header.map(csvCell).join(",")];
  S.items.forEach(function(it){
    var storeVals=checkedStores.map(function(s){
      var r=S.results[s.id]&&S.results[s.id][it._key];
      return r&&r.s==="found"?(r.oos?"OOS":"✓"):"—"});
    var row=[it.artist,it.title,it.year,it.label,it.format,it.source||""].concat(storeVals);
    rows.push(row.map(csvCell).join(","))});
  var blob=new Blob(["\uFEFF"+rows.join("\r\n")],{type:"text/csv;charset=utf-8;"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="wantlist-"+new Date().toISOString().slice(0,10)+".csv";
  a.click();URL.revokeObjectURL(a.href)}

function totalFound(){
  var ids={};STORES.forEach(function(s){if(!S.results[s.id])return;
    Object.keys(S.results[s.id]).forEach(function(k){var r=S.results[s.id][k];if(r.s==="found"&&(!S.hideOos||!r.oos))ids[k]=true})});return Object.keys(ids).length}
function storeFoundCount(sid){if(!S.results[sid])return 0;var c=0;Object.values(S.results[sid]).forEach(function(v){if(v.s==="found"&&(!S.hideOos||!v.oos))c++});return c}
function storeErrCount(sid){if(!S.results[sid])return 0;var c=0;Object.values(S.results[sid]).forEach(function(v){if(v.s==="err")c++});return c}
function hasAnyResults(){return Object.keys(S.results).length>0}
function isFoundAt(it,sid){return S.results[sid]&&S.results[sid][it._key]&&S.results[sid][it._key].s==="found"}
function isInStockAnywhere(it){

var WEB_SEARCH_PLATFORMS=new Set(['text-match','woocommerce','magento','slug-direct','vinyldisc','shopify-suggest']);
function isFormatUncertain(it,store){
  /* Search-based stores match by title, not release ID — format could differ.
     Most Porto stores primarily sell vinyl. If wantlist item is NOT vinyl,
     a search match likely means a different format is available. */
  if(WEB_SEARCH_PLATFORMS.has(store.platform))return it.format.toLowerCase().indexOf("vinyl")===-1;
  /* Common Ground stores: if match was exact (same release ID), format is certain */
  if(store.platform==="common-ground"){
    var r=S.results[store.id]&&S.results[store.id][it._key];
    if(r&&r.exact)return false;
    return it.format.toLowerCase().indexOf("vinyl")===-1}
  return false}

function wireLoginCard(){

    if(e.key==="Enter"){S.mbUser=imu.value.trim();saveCreds();if(S.mbUser){S.mbCollections=[];S.mbError=null;fetchMBCollections(S.mbUser)}}});

    S.mbCollectionIds=Array.prototype.filter.call(chks,function(cb){return cb.checked}).map(function(cb){return cb.value});
    if(S.mbCollectionIds.length)fetchMBCollection()});
  var bmbback=$("bmbback");

  var icsv=$("icsv");if(icsv)icsv.addEventListener("input",function(){S.csvText=icsv.value});
  var icsvf=$("icsv-file");
  if(icsvf)icsvf.addEventListener("change",function(){
    var f=icsvf.files[0];if(!f)return;
    var rd=new FileReader();
    rd.onload=function(e){
      /* Detect encoding via BOM, then decode */
      var buf=e.target.result;
      var bytes=new Uint8Array(buf.slice(0,3));
      var enc="utf-8",skip=0;
      if(bytes[0]===0xFF&&bytes[1]===0xFE){enc="utf-16le";skip=2}
      else if(bytes[0]===0xFE&&bytes[1]===0xFF){enc="utf-16be";skip=2}
      else if(bytes[0]===0xEF&&bytes[1]===0xBB&&bytes[2]===0xBF){skip=3}
      var text=new TextDecoder(enc).decode(buf.slice(skip)).replace(/^\uFEFF/,"");
      S.csvText=text;
      S.csvPreview=detectAndParse(text,f.name);
      render()};
    rd.readAsArrayBuffer(f)});
  var bcsvparse=$("bcsvparse");
  if(bcsvparse)bcsvparse.addEventListener("click",function(){S.csvPreview=detectAndParse(S.csvText,"");render()});
  var bcsvload=$("bcsvload");
  if(bcsvload)bcsvload.addEventListener("click",function(){
    if(S.csvPreview&&S.csvPreview.items.length>0){
      var merging=S.addingSource;
      var newItems=S.csvPreview.items.slice();
      if(merging){newItems=newItems.filter(function(it){return!isDuplicate(it)});S.items=S.items.concat(newItems)}
      else{S.items=newItems;S.results={};S.invCache={};S.sources=[];S.search="";S.format="all";S.onlyFound=false;S.filterStores={};S.vis=PER_PAGE;}
      var srcLabel=S.csvPreview.format==="itunes"?"iTunes":"CSV";

  var bcsvback=$("bcsvback");
  if(bcsvback)bcsvback.addEventListener("click",function(){S.csvPreview=null;render()})}

    $("bb").addEventListener("click",function(){S.loaded=false;clearSaved();render()});return}

  var fl=filtered(),sh=fl.slice(0,S.vis),more=sh.length<fl.length;

    if(staleHrs>=1){
      o+='<div class="stale-banner"><span>Results from <strong>'+agoStr(S.lastChecked)+'</strong> \u2014 stock may have changed</span><button id="bstale">Re-check</button></div>'}}

  var srcSummary=S.sources.length?S.sources.join(" + "):(S.source==="mb"?"MusicBrainz":S.source==="csv"?"CSV":"Discogs");
  o+='<div class="top-bar"><div style="font-size:13px;color:var(--tx2)">Loaded <strong>'+S.items.length+'</strong> items \u00b7 <strong>'+h(srcSummary)+'</strong>'+
    (S.lastChecked&&hc?' \u00b7 <span style="color:var(--tx3)">checked '+agoStr(S.lastChecked)+'</span>':'')+
    '</div>'+
    '<div style="display:flex;gap:8px">'+
    (S.sources.length<=1?'<button class="btn-sec btn-sm" id="brl">\u21BB Refresh</button>':'')+
    '<button class="btn-sec btn-sm" id="badd">+ Add</button>'+
    '<button class="btn-sec btn-sm" id="brs">Clear</button></div></div>';

  o+='<div class="stats"><div class="stat"><div class="stat-n">'+S.items.length+'</div><div class="stat-l">Wantlist</div></div>'+
    '<div class="stat"><div class="stat-n">'+Object.keys(artc).length+'</div><div class="stat-l">Artists</div></div>';
  if(hc)o+='<div class="stat"><div class="stat-n green">'+tf+'</div><div class="stat-l">Found</div></div>';
  o+='</div>';

  /* Store selector */
  var selCount=CHECKABLE.filter(function(s){return S.selectedStores[s.id]}).length;
  var _chev=S.storesOpen?'<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,5 7,10 12,5"/></svg>':'<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,10 7,5 12,10"/></svg>';
  o+='<div class="card"><div class="store-hdr"><div id="bstoggle" style="display:flex;align-items:center;gap:6px;cursor:pointer"><span style="display:flex;align-items:center;color:var(--tx2)">'+_chev+'</span><span style="font-size:14px;font-weight:700">Stores to check</span><span style="font-size:11px;color:var(--tx3);font-weight:400">'+(selCount>0?selCount+' selected':'none selected')+'</span></div>'+
    (S.storesOpen?'<div style="display:flex;align-items:center;gap:10px">'+
    '<div class="city-tog">'+
    '<button class="ct'+(S.cityPorto?" on":"")+'" data-ct="porto">Porto</button>'+
    '<button class="ct'+(S.cityLisbon?" on":"")+'" data-ct="lisbon">Lisbon</button>'+
    '</div>'+
    '<div class="store-hdr-btns"><button id="bsa">Select all</button><button id="bsd">Deselect all</button></div>'+
    '</div>':'')+
    '</div>';
  if(S.storesOpen){
    var portoStores=STORES.filter(function(s){return s.city==="porto"&&S.cityPorto});
    var lisbonStores=STORES.filter(function(s){return s.city==="lisbon"&&S.cityLisbon});
    var bothCities=S.cityPorto&&S.cityLisbon&&portoStores.length>0&&lisbonStores.length>0;
    o+='<div class="store-grid'+(S._storesJustOpened?' opening':'')+'">';
    var renderStoreCard=function(s){
      var checkable=s.platform!=="web-tbd",checked=S.selectedStores[s.id],tbd=s.platform==="web-tbd";
      var typeLabel=PLATFORM_LABELS[s.platform]||"Website";
      if(s.slow)typeLabel+=" \u00b7 Slow";
      var cityLabel=s.city==="porto"?"Porto":"Lisbon";
      var cityClass=s.city==="porto"?"city-porto":"city-lisbon";
      var ini=s.name.substring(0,2).toUpperCase();
      o+='<label class="store-opt'+(checked&&checkable?' on':'')+'" style="'+(tbd?'opacity:.5;cursor:default':'')+'">';
      o+='<div class="logo">'+(s.logo?'<img src="'+h(s.logo)+'" alt="" data-color="'+s.color+'" data-ini="'+ini+'" onerror="repStoreLogo(this)">':'<div style="width:100%;height:100%;border-radius:50%;background:'+s.color+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700">'+ini+'</div>')+'</div><div style="flex:1"><div class="sn">'+h(s.name)+'</div><div style="display:flex;align-items:center"><span class="st">'+typeLabel+'</span><span class="city-pill '+cityClass+'">'+cityLabel+'</span></div>';
      o+='<div class="slinks">';
      if(s.url)o+='<a href="'+h(s.url)+'" target="_blank" onclick="event.stopPropagation()"><span class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span>website</a>';
      if(s.map)o+='<a href="'+h(s.map)+'" target="_blank" onclick="event.stopPropagation()"><span class="ic"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span>map</a>';
      o+='</div></div>';
      if(checkable)o+='<input type="checkbox" data-sid="'+s.id+'"'+(checked?' checked':'')+'>';
      o+='</label>'};
    if(bothCities)o+='<div class="store-city-hdr">Porto</div>';
    portoStores.forEach(renderStoreCard);
    if(bothCities)o+='<div class="store-city-hdr">Lisbon</div>';
    lisbonStores.forEach(renderStoreCard);
    o+='</div>';}

  /* Check button + progress */
  var unchecked=CHECKABLE.filter(function(s){return S.selectedStores[s.id]&&!S.results[s.id]}).length;
  o+='<div class="btn-row">';
  if(!S.checking){
    if(unchecked>0&&!hc)o+='<button class="btn-green" id="bch">\u2713 Check selected stores</button>';
    else if(unchecked>0)o+='<button class="btn-green" id="bch">\u2713 Check '+unchecked+' unchecked</button>';
    if(hc)o+='<button class="btn-sec btn-sm" id="brch">\u21BB Re-check all</button>'}
  else{
    o+='<button class="btn-sec btn-sm" id="bst">\u25A0 Stop</button>';
    o+='<button class="btn-skip" id="bsk">Skip \u2192</button>';
    o+=spinSvg();
    var _counter=S.storesTotal>1?" ("+(S.storesDone+1)+"/"+S.storesTotal+")":"";
    o+='<div class="check-progress"><div class="phase-label" id="chkphase">'+(S.checkPhase==="discogs"?"Loading: ":"Checking: ")+h(S.checkStore)+h(_counter)+'</div>';
    o+='<div class="progress-text" id="chkprog">Starting\u2026</div>';
    o+='<div class="pbar"><div class="pfill pfill-green" id="chkfill" style="width:0%"></div></div>';
    if(S.checkLog.length>0){o+='<div class="check-log">';S.checkLog.forEach(function(e){o+='<span class="cl-entry">\u2713 '+h(e.name)+(e.found>0?': '+e.found+' found':'')+'</span>'});o+='</div>'}
    o+='</div>'}
  o+='</div></div>';

  /* Store filter chips — below the check card */
  if(hc){
    var oosCount=0;S.items.forEach(function(it){var st=getItemStores(it);if(st.length>0&&!isInStockAnywhere(it))oosCount++});
    o+='<div class="store-stats">';
    o+='<div class="store-stat'+(S.onlyFound&&!hasFilterStores()?' on':'')+'" data-sf="all" style="cursor:pointer"><span style="font-size:11px">All found</span> <span class="cnt">'+tf+'</span></div>';
    if(oosCount>0)o+='<div class="store-stat'+(S.hideOos?' on':'')+'" id="boos" style="cursor:pointer"><span style="font-size:11px">In stock only</span></div>';
    CHECKABLE.forEach(function(s){if(!S.results[s.id])return;var fc=storeFoundCount(s.id),ec=storeErrCount(s.id);
      var ini=s.name.substring(0,2).toUpperCase();
      var logoHtml=s.logo?'<div class="slogo"><img src="'+h(s.logo)+'" alt="" data-color="'+s.color+'" data-ini="'+ini+'" onerror="repStoreLogo(this)"></div>':'<div class="slogo" style="background:'+s.color+';border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:7px;font-weight:700">'+ini+'</div>';
      if(fc>0)o+='<div class="store-stat'+(S.filterStores[s.id]?' on':'')+'" data-sf="'+s.id+'" style="cursor:pointer">'+logoHtml+h(s.short)+' <span class="cnt">'+fc+'</span>'+(ec?' <span title="'+ec+' requests failed \u2014 site may have rate-limited the checker" style="color:#b45309;font-size:10px">\u26a0\ufe0f</span>':'')+'</div>';
      else if(ec>0)o+='<div class="store-stat" style="opacity:.7;cursor:default" title="'+ec+' requests failed \u2014 try re-checking (site may rate-limit large lists)">'+logoHtml+h(s.short)+' <span style="color:#b45309;font-size:10px">\u26a0\ufe0f '+ec+' errors</span></div>'});
    o+='</div>'}

  /* Toolbar */
  var fmtData=fmts(),fmList=fmtData.list,fmCounts=fmtData.counts;
  o+='<div class="toolbar"><input class="search" id="isrch" placeholder="Search artist, title, label\u2026" value="'+h(S.search)+'" autocomplete="off">'+
    '<button class="btn-sec btn-sm" id="bexp" title="Export as CSV">\u2193 Export</button>';
  o+='<div class="vtog"><button class="vb'+(S.view==="grid"?' on':'')+'" data-v="grid" title="Grid (medium)">'+IG+'</button>'+
    '<button class="vb'+(S.view==="grid-sm"?' on':'')+'" data-v="grid-sm" title="Grid (small)">'+IGS+'</button>'+
    '<button class="vb'+(S.view==="list"?' on':'')+'" data-v="list" title="List">'+IL+'</button></div></div>';
  o+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">';
  fmList.forEach(function(f){
    var cnt=f==="all"?S.items.length:(fmCounts[f]||0);
    var fc=hc?fmtFoundCount(f):0;
    o+='<button class="fbtn'+(S.format===f?' on':'')+'" data-f="'+h(f)+'">';
    o+=(f==="all"?"All":h(f));
    o+=' <span class="fc">'+cnt;
    if(fc>0)o+=' &middot; <span>'+fc+' found</span>';
    o+='</span></button>'});
  o+='</div>';

  /* Group items by artist+title for accordion view */
  var shGroups=[],shGroupMap={};
  sh.forEach(function(it){var k=groupKey(it);if(!shGroupMap[k]){shGroupMap[k]=[];shGroups.push(shGroupMap[k])}shGroupMap[k].push(it)});
  o+='<div class="v-'+S.view+'">';shGroups.forEach(function(g){o+=renderGroup(g)});o+='</div>';
  if(more)o+='<div class="more"><button class="btn-sec" id="bmo">Show more ('+(fl.length-sh.length)+' remaining)</button></div>';
  if(fl.length===0)o+='<div class="empty">No items match your filters.</div>';

  if(S.addingSource)o=renderLoginCard()+o;
  root.innerHTML=o;
  if(S.checking)requestAnimationFrame(function(){window.scrollTo(0,_sy)});
  if(S.addingSource)wireLoginCard();

  /* Events */
  $("brs").addEventListener("click",function(){S.loaded=false;S.items=[];S.error=null;S.results={};S.invCache={};S.sources=[];S.addingSource=false;S.lastChecked=null;clearSaved();render()});
  var badd=$("badd");if(badd)badd.addEventListener("click",function(){S.addingSource=true;S.error=null;render()});
  var bexp=$("bexp");if(bexp)bexp.addEventListener("click",exportCSV);
  var brl=$("brl");if(brl)brl.addEventListener("click",function(){
    if(S.source==="mb"&&S.mbCollectionIds.length)fetchMBCollection();
    else if(S.source==="csv"){S.loaded=false;render()}
    else if(S.user)fetchWL()});
  var isrch=$("isrch");if(isrch)isrch.addEventListener("input",function(e){S.search=e.target.value;S.vis=PER_PAGE;render();var el=$("isrch");if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}});
  document.querySelectorAll("[data-f]").forEach(function(b){b.addEventListener("click",function(){S.format=b.getAttribute("data-f");S.vis=PER_PAGE;render()})});
  document.querySelectorAll("[data-v]").forEach(function(b){b.addEventListener("click",function(){S.view=b.getAttribute("data-v");saveState();render()})});
  document.querySelectorAll("[data-sid]").forEach(function(cb){cb.addEventListener("change",function(){S.selectedStores[cb.getAttribute("data-sid")]=cb.checked;saveState();render()})});
  var bstoggle=$("bstoggle");if(bstoggle)bstoggle.addEventListener("click",function(){
    if(S.storesOpen){
      var g=document.querySelector(".store-grid");
      if(g){g.classList.add("closing");g.addEventListener("animationend",function(){S.storesOpen=false;render()},{once:true})}
      else{S.storesOpen=false;render()}}
    else{S.storesOpen=true;S._storesJustOpened=true;render();S._storesJustOpened=false;}});
  var bsa=$("bsa");if(bsa)bsa.addEventListener("click",function(){CHECKABLE.forEach(function(s){if((s.city==="porto"&&S.cityPorto)||(s.city==="lisbon"&&S.cityLisbon))S.selectedStores[s.id]=true});saveState();render()});
  var bsd=$("bsd");if(bsd)bsd.addEventListener("click",function(){CHECKABLE.forEach(function(s){if((s.city==="porto"&&S.cityPorto)||(s.city==="lisbon"&&S.cityLisbon))S.selectedStores[s.id]=false});saveState();render()});
  document.querySelectorAll("[data-ct]").forEach(function(b){b.addEventListener("click",function(){var c=b.getAttribute("data-ct");if(c==="porto")S.cityPorto=!S.cityPorto;else S.cityLisbon=!S.cityLisbon;if(!S.cityPorto&&!S.cityLisbon){if(c==="porto")S.cityLisbon=true;else S.cityPorto=true}saveState();render()})});
  document.querySelectorAll("[data-sf]").forEach(function(el){el.addEventListener("click",function(){
    var sf=el.getAttribute("data-sf");
    if(sf==="all"){S.filterStores={};S.onlyFound=!S.onlyFound}
    else{
      if(S.filterStores[sf])delete S.filterStores[sf];
      else S.filterStores[sf]=true;
      S.onlyFound=hasFilterStores()||S.onlyFound}
    S.vis=PER_PAGE;render()})});
  var bmo=$("bmo");if(bmo)bmo.addEventListener("click",function(){S.vis+=PER_PAGE;render()});
  document.querySelectorAll(".grp-tog").forEach(function(b){b.addEventListener("click",function(e){e.stopPropagation();var gk=b.getAttribute("data-gk");S.expanded[gk]=!S.expanded[gk];render()})});
  var boos=$("boos");if(boos)boos.addEventListener("click",function(){S.hideOos=!S.hideOos;S.onlyFound=S.hideOos||S.onlyFound;S.vis=PER_PAGE;render()});
  var bch=$("bch");if(bch)bch.addEventListener("click",function(){checkAll(false)});
  var brch=$("brch");if(brch)brch.addEventListener("click",function(){checkAll(true)});
  var bstale=$("bstale");if(bstale)bstale.addEventListener("click",function(){checkAll(true)});
  var bst=$("bst");if(bst)bst.addEventListener("click",function(){S.cabort=true});
  var bsk=$("bsk");if(bsk)bsk.addEventListener("click",function(){S.cskip=true})}

render()
})();
</script>
</body>
</html>
